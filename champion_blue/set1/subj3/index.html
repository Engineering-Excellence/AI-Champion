<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>청렴 신고 사건 조회 | 행정안전부 청렴감사관실</title>
<style>
  :root{--navy:#1a2a5e;--blue:#2b5dd6;--bg:#f4f6fb;--line:#e2e6f0;--muted:#6b7280;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Malgun Gothic","맑은 고딕",sans-serif;background:var(--bg);color:#1f2937;}
  header{background:var(--navy);color:#fff;padding:28px 20px;}
  header .wrap{max-width:1080px;margin:0 auto;}
  header h1{margin:0 0 6px;font-size:24px;}
  header p{margin:0;opacity:.85;font-size:14px;}
  main{max-width:1080px;margin:0 auto;padding:24px 20px 60px;}
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:#fff;
    border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--muted);font-weight:600;}
  .field input,.field select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;min-width:170px;background:#fff;}
  .count{margin:0 0 14px;font-size:15px;font-weight:700;color:var(--navy);}
  .count b{color:var(--blue);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;
    box-shadow:0 1px 2px rgba(20,30,80,.04);}
  .card .id{font-size:12px;color:var(--muted);}
  .card .type{font-size:18px;font-weight:700;margin:4px 0 10px;color:var(--navy);}
  .card .row{display:flex;justify-content:space-between;font-size:13px;margin:5px 0;}
  .card .row span:first-child{color:var(--muted);}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;}
  .s-처리완료{background:#e6f4ea;color:#137333;}
  .s-조사중{background:#fef7e0;color:#a36a00;}
  .s-접수완료{background:#e8f0fe;color:#1a56db;}
  .s-이첩{background:#f3e8fd;color:#7e22ce;}
  .s-기각{background:#fce8e6;color:#c5221f;}
  .empty{padding:40px;text-align:center;color:var(--muted);}
  section.rss{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin:26px 0 0;}
  section.rss h2{margin:0 0 4px;font-size:18px;color:var(--navy);}
  section.rss .src{font-size:12px;color:var(--muted);margin:0 0 12px;}
  section.rss ul{list-style:none;margin:0;padding:0;}
  section.rss li{padding:10px 0;border-top:1px solid var(--line);font-size:14px;}
  section.rss li:first-child{border-top:none;}
  section.rss a{color:var(--blue);text-decoration:none;font-weight:600;}
  section.rss a:hover{text-decoration:underline;}
  section.rss .date{display:block;color:var(--muted);font-size:12px;margin-top:3px;}
  footer{max-width:1080px;margin:0 auto;padding:0 20px 40px;color:var(--muted);font-size:12px;}
</style>
</head>
<body>
<header><div class="wrap">
  <h1>청렴 신고 사건 조회</h1>
  <p>행정안전부 청렴감사관실 · 시민 공개용 신고 사건 검색 서비스</p>
</div></header>

<main>
  <div class="controls">
    <div class="field">
      <label for="kw">검색 (사건ID·지역)</label>
      <input id="kw" type="text" placeholder="예: 서울, CASE0001">
    </div>
    <div class="field">
      <label for="type">신고유형</label>
      <select id="type"><option value="">전체</option></select>
    </div>
    <div class="field">
      <label for="status">처리상태</label>
      <select id="status"><option value="">전체</option></select>
    </div>
  </div>

  <p class="count">결과 <b id="cnt">0</b>건</p>
  <div class="grid" id="grid"></div>

  <section class="rss">
    <h2>관련 보도자료 (korea.kr)</h2>
    <p class="src">출처: 행정안전부 보도자료 RSS · https://www.korea.kr/rss/dept_mois.xml</p>
    <ul id="rss"><li>보도자료를 불러오는 중…</li></ul>
  </section>
</main>

<footer>© 행정안전부 청렴감사관실 · 본 페이지는 청렴 신고 현황 안내용 정적 페이지입니다.</footer>

const grid = document.getElementById('grid');
const cnt = document.getElementById('cnt');
const kwEl = document.getElementById('kw');
const typeEl = document.getElementById('type');
const statusEl = document.getElementById('status');

// 필터 옵션 채우기
[...new Set(CASES.map(c => c.신고유형))].sort().forEach(v => {
  typeEl.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`);
});
[...new Set(CASES.map(c => c.처리상태))].sort().forEach(v => {
  statusEl.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`);
});

function render() {
  const kw = kwEl.value.trim().toLowerCase();
  const t = typeEl.value, s = statusEl.value;
  const rows = CASES.filter(c =>
    (!t || c.신고유형 === t) &&
    (!s || c.처리상태 === s) &&
    (!kw || c.지역.toLowerCase().includes(kw) || c.사건ID.toLowerCase().includes(kw))
  );
  cnt.textContent = rows.length;
  if (!rows.length) { grid.innerHTML = '<div class="empty">조건에 맞는 사건이 없습니다.</div>'; return; }
  grid.innerHTML = rows.slice(0, 200).map(c => `
    <div class="card">
      <div class="id">${c.사건ID}</div>
      <div class="type">${c.신고유형}</div>
      <div class="row"><span>신고일자</span><span>${c.신고일자}</span></div>
      <div class="row"><span>지역</span><span>${c.지역}</span></div>
      <div class="row"><span>처리상태</span><span class="badge s-${c.처리상태}">${c.처리상태}</span></div>
    </div>`).join('');
}
[kwEl, typeEl, statusEl].forEach(el => el.addEventListener('input', render));
render();

// korea.kr 보도자료 RSS 임베드 (CORS 우회 프록시 경유, 최신 5건 이상)
const RSS_URL = 'https://www.korea.kr/rss/dept_mois.xml';
const PROXY = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(RSS_URL);
fetch(PROXY)
  .then(r => r.text())
  .then(xml => {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const items = [...doc.querySelectorAll('item')].slice(0, 7);
    if (!items.length) throw new Error('no items');
    document.getElementById('rss').innerHTML = items.map(it => {
      const title = it.querySelector('title')?.textContent ?? '(제목 없음)';
      const link = it.querySelector('link')?.textContent ?? '#';
      const date = it.querySelector('pubDate')?.textContent ?? '';
      return `<li><a href="${link}" target="_blank" rel="noopener">${title}</a>
              <span class="date">${date}</span></li>`;
    }).join('');
  })
  .catch(() => {
    document.getElementById('rss').innerHTML =
      '<li>보도자료를 불러오지 못했습니다. ' +
      '<a href="https://www.korea.kr/rss/dept_mois.xml" target="_blank" rel="noopener">RSS 원본 보기</a></li>';
  });
</script>
